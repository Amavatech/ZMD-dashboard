{% extends "base.html" %}

{% block head%}
<title>
    Sign Up
</title>
{% endblock %}

{% block content %}
<div class="mx-auto w-75">
    
    <div class=" col-md-5 p-lg-5 mx-auto my-5 rounded bg-dark text-light">
        <img class="mb-4 w-75" src="{{url_for('static',filename='ZMD logo.jpg')}}" alt="">
        {%with messages=get_flashed_messages()%}
        {%if messages%}
        <div class="text-light bg-danger rounded m2 p-3">
            Email already exists. Go to <a href="{{url_for('auth.login')}}">login page</a>.
        </div>
        {%endif%}
        {%endwith%}
        <form class="form-signin" method="POST" action="/signup">
            <h1 class="h3 mb-3 font-weight-normal">Please sign up</h1>
            <label for="inputEmail" class="sr-only">Email address</label>
            <input type="email" id="inputEmail" name="email" class="form-control mb-3" placeholder="Email address" required autofocus>
            <label for="inputName" class="sr-only">Password</label>
            <input type="text" id="inputName" name="name" class="form-control  mb-3" placeholder="Name" required>
            <label for="inputPassword" class="sr-only">Password</label>
            <input type="password" id="inputPassword" name="password" class="form-control  mb-3" placeholder="Password" required>
            <button class="btn btn-lg btn-primary btn-block" type="submit">Sign up</button>
        </form>
    </div>
</div>
{% endblock %}
