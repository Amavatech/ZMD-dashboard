<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="title" content="MQTT Dashboard">
    <meta name="description" content=" Track your  data from Campbell Scientific devices">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<style>
    #broker-table>tbody>tr:hover {
        background-color: grey;
    }

    .selected {
        background-color: black;
    }
</style>

<body class="bg-light overflow-hidden">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script type="text/javascript" src="{{url_for('static',filename='index.js')}}"></script>
    <div class="vh-100 d-flex flex-column">
        <nav class="site-header sticky-top py-1 bg-white">

            <div style="display: flex; align-items:center;"
                class="container d-flex flex-column flex-md-row justify-content-between">
                <img style="max-width: 20%" class="img-fluid py-2 d-none d-md-inline-block"
                    src="{{url_for('static',filename='ZMD logo.jpg')}}" alt="">
                    <a class="py-2 d-none d-md-inline-block" href="/admin">
                        User Admin
                    </a>
                <a class="py-2 d-none d-md-inline-block" href="/dashboard_admin">
                    Dashboard Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/broker_admin">
                    Broker Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/group_admin">
                    Group Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/">
                    Exit
                </a>
            </div>
        </nav>

        <div style="display: flex" class="bg-light flex-grow-1 overflow-auto vw-100">
            <div style="border-radius: 10px; text-align: center;" class="bg-dark w-25 m-1 text-white">
                <h1 style="text-align: center;">
                    Brokers
                </h1>
                <input style="display:block;margin-left: auto; margin-right: auto;" type="text" id="fname" name="fname"
                    class="w-75">
                <div style="height: 60%;" class="overflow-auto mt-2 ml-2 mr-2">
                    <table style="width:100%; text-align: center;" id="broker-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>URL</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                </div>
                <button disabled class="btn btn-primary w-75" id="removeBrokerBtn">Remove Broker</button>
            </div>
            <div style="border-radius: 10px;text-align: center;" class="bg-dark w-50 m-1 text-white">
                <h1 style="text-align: center;">
                    Details
                </h1>
                <div style="height: 60%;" class="overflow-auto mt-2 ml-2 mr-2">
                    <h2 style="text-align: center;" id="brokerIDcell">
                    ID: 
                    </h2>
                    <table style="width:100%; text-align: center;" id="details-table">
                    <tbody>
                        <tr>
                            <td>Name:</td>
                            <td><input type="text" class="form-control mt-2" id="nameInput1" placeholder="Name"></td>
                        </tr>
                        <tr>
                            <td>URL:</td>
                            <td><input type="text" class="form-control mt-2" id="URLinput1" placeholder="URL"></td>
                        </tr>
                        <tr>
                            <td>Port</td>
                            <td><input type="number" class="form-control mt-2" id="portInput1" placeholder="0"></td>
                        </tr>
                        <tr>
                            <td>Username:</td>
                            <td><input type="text" class="form-control mt-2" id="usernameInput1" placeholder="Username"></td>
                        </tr>
                        <tr>
                            <td>Password:</td>
                            <td><input type="password" class="form-control mt-2" id="passwordInput1" placeholder="Password"></td>
                        </tr>
                    </tbody>
                </table>
                
                </div>
                <button class="btn btn-primary w-50 mt-4" id="editDetailsBtn">Save Changes</button>
                <div style="color: red;text-align: center;" class="w-100" id="alertDiv1"></div>
            </div>
                <div style="border-radius: 10px; text-align: center;" class="bg-dark w-25 m-1 text-white">
                    <div class="mt-5">
                        <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                            <input type="text" class="form-control" id="nameInput2" placeholder="Enter Name">
                        </div>
                        <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                            <input type="text" class="form-control" id="URLinput2" placeholder="Enter URL">
                        </div>
                        <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                            <input type="number" class="form-control" id="portInput2" placeholder="Enter Port">
                        </div>
                        <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                            <input type="text" class="form-control" id="usernameInput2" placeholder="Enter Username">
                        </div>
                        <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                            <input type="password" class="form-control" id="passwordInput2" placeholder="Enter Password">
                        </div>
                        <button class="btn btn-primary w-50" id="addBrokerBtn">Add New Broker</button>
                        <div style="color: red;text-align: center;" class="w-100" id="alertDiv2">

                        </div>
                    </div>
                </div>
            
        </div>
</body>
<script>
    var brokers = [];
    var selectedBrokerID = -1;
    var selectedPermID=-1;
    var selectedPermType = "TOPIC";
    var selectedTableID=-1
    {%for broker in brokers %}
    brokers.push({ id: {{ broker["id"]}}, name: "{{broker["name"]}}", URL: "{{broker["URL"]}}", username: "{{broker["username"]}}",
    password: "{{broker["password"]}}",port:{{ broker["port"]}}});
    {% endfor %}
    const broker_search_box = document.getElementById('fname');

    $(document).on('click', '#addBrokerBtn', function () {
        let URL = $("#URLinput2").val();
        let name = $("#nameInput2").val();
        let port = $('#portInput2').val()
        let username = $("#usernameInput2").val();
        let password = $("#passwordInput2").val();

        if (URL == "") {
            $("#alertDiv").html("No URL")
            return;
        }
        if (name == "") {
            $("#alertDiv").html("No Name")
            return;
        }

        var params = JSON.stringify({ "URL": URL, "name": name, "password": password,"port":port,"username":username });

        fetch("/create_broker", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                if (json["status"] == "fail") {
                    $("#alertDiv").html("Broker Creation Failed");
                }
                else {
                    $("#alertDiv").html("User Created");
                    searchBroker("");
                    
                }
            });

    });

    $(document).on('click', '#removeBrokerBtn', function () {
        if (!confirm("Delete Broker?")) {
            return;
        }
        var params = JSON.stringify({ "id": selectedBrokerID });
        fetch("/delete_broker", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                searchBroker("")
            })
    });

    $(document).on('click','#editDetailsBtn',()=>{
        let URL=$("#URLinput1").val();
        let name=$("#nameInput1").val();
        let port=$("#portInput1").val();
        let username=$("#usernameInput1").val();
        let password=$("#passwordInput1").val();

        if(URL=="")
        {
            $("#alertDiv1").html("No URL")
            return;
        }
        if(name=="")
        {
            $("#alertDiv1").html("No Name")
            return;
        }

        var params = JSON.stringify({ "id": selectedBrokerID, "name":name,"URL":URL,"port":port,"username":username,"password":password});

        console.log(port)

        fetch("/edit_broker", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                showBrokerDetails();
                
                searchBroker("")

                broker=brokers.find(
                    b=>b["id"]==selectedBrokerID
                );
                broker["URL"]=URL;
                broker["port"]=port;
                broker["name"]=name;
                broker["username"]=username;
                broker["password"]=password;
            })
    })

    function setSelectedPermType(permType) {
        selectedPermType = permType;
        $("#dropdownMenuLink").html(permType)
    }

    function setSelectedTable(tableID,topic)
    {
        selectedTableID=tableID
        
        var l=topic.split("/").pop()

        $("#dropdownMenuLink2").html(l)
    }

    function showBrokerDetails()
    {
        broker=brokers.find(
            b=>b["id"]==selectedBrokerID
        );
        $("#brokerIDcell").html("ID: "+selectedBrokerID.toString());
        $("#nameInput1").val(broker["name"])
        $("#URLinput1").val(broker["URL"])
        $("#portInput1").val(broker["port"])
        $("#usernameInput1").val(broker["username"])
        $("#passwordInput1").val(broker["password"])
    }

    function searchBroker(v) {
        var params = JSON.stringify({ "searchval": v });

        fetch("/search_brokers", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                if (json["brokers"] == "none") {
                    clearBrokerDetails();
                    $("#broker-table>tbody").empty();
                }
                else {
                    clearBrokerDetails();
                    $("#broker-table>tbody").empty();
                    brokers=[]
                    json["brokers"].forEach(function (broker) {
                        addTableRowBroker(broker.id, broker.name, broker.URL);
                        brokers.push({id:broker.id,name:broker.name,URL:broker.URL,port:broker.port,username:broker.username,password:broker.password})
                    });
                    $("#broker-table>tbody>tr").click(clickTableRowsBroker)
                }
            });
        $("#removeBrokerBtn").prop('disabled', true);
    }

    function clickTableRowsBroker() {
        $(this).addClass('selected').siblings().removeClass('selected');
        var value = $(this).find('td:first').html();
        selectedBrokerID = parseInt(value);


        showBrokerDetails();

        $("#removeBrokerBtn").prop('disabled', false)
        $("#editDetailsBtn").prop("disabled",false);
    }

    const textChanged = function (e) {
        searchval = e.target.value;

        searchBroker(searchval);
    }

    function addTableRowBroker(brokerID, brokerName, brokerURL) {
        $("#broker-table").append("<tr><td>" + brokerID.toString() + "</td><td>" + brokerName + "</td><td>" + brokerURL + "</td></tr>");
        
    }

    function clearBrokerDetails() {
        $("#brokerIDcell").html("ID: ");
        $("#nameInput1").val("")
        $("#URLinput1").val("")
        $("#portInput1").val(0)
        $("#usernameInput1").val("")
        $("#passwordInput1").val("")
    }

    broker_search_box.addEventListener('input', textChanged);

    const validateEmail = (email) => {
        return String(email)
            .toLowerCase()
            .match(
                /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
            );
    };

    brokers.forEach(function (broker) {
        addTableRowBroker(broker.id, broker.name, broker.URL);
    });

    clearBrokerDetails();
    $("#removeBrokerBtn").prop("disabled",true);
    $("#editDetailsBtn").prop("disabled",true);

    $("#broker-table>tbody>tr").click(clickTableRowsBroker);

    $("#perm-table > tbody >tr").click(function () {
        $(this).addClass('selected').siblings().removeClass('selected');
        var value = $(this).find('td:first').html();
    });
</script>

</html>
