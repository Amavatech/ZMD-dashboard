<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threshold Settings Configuration</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
           
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 800px;
            background: #ffffff;
            color: #333;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, opacity 0.3s ease;
            overflow-y: auto;
            max-height: 90vh;
        }
        .container.hidden {
            transform: translateY(20px);
            opacity: 0;
        }
        .form-group {
            margin-top: 20px;
        }
        .modal-table td {
            padding: 10px;
            white-space: nowrap;
        }
        .offline {
            color: red;
        }
        .online {
            color: green;
        }
        .loader {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: opacity 0.3s ease-in-out;
            color: #333;
        }
        .loader.show {
            display: block;
            opacity: 1;
        }
        .progress {
            height: 20px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            transition: width 0.3s ease-in-out;
        }
        .card-header {
            cursor: pointer;
            background: none;
            border: none;
        }
        .form-check-input {
            transform: scale(1.2);
        }
        .modal {
            transition: opacity 0.3s ease-in-out;
        }
        .modal.show {
            opacity: 1;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .hidden {
            display: none;
        }
        .centered {
            text-align: center;
        }
        .modal-body-scrollable {
            max-height: 400px;
            overflow-y: auto;
        }
        .station-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            background: #f8f9fa;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background-color 0.3s ease;
        }
        .station-item:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Step 1: User Selects either Individual Stations or Group Stations -->
    <div id="step1" class="centered">
        <h3>Threshold Settings Options</h3>
        <button class="btn btn-primary m-2" id="individualButton">Individual Stations</button>
        <button class="btn btn-primary m-2" id="groupButton">Group of Stations</button>
    </div>

    <!-- Step 2: User Configures Selected Type -->
    <div id="step2" class="hidden">
        <div id="groupConfig" class="hidden">
            <h3>Group of Stations</h3>
            <button class="btn btn-secondary mt-3" id="switchToIndividual">Switch to Individual Stations</button>
            <div id="accordion"></div>
            
        </div>
        <div id="individualConfig" class="hidden">
            <h3>Individual Stations</h3>
            <button class="btn btn-primary" data-toggle="modal" data-target="#tablesModal">Select Stations</button><hr>
            <button class="btn btn-primary" id="switchToGroup">Switch to Group of Stations</button>
        </div>
        <div class="form-group">
            <label for="sensorSelect">Select Sensor</label>
            <select class="form-control" id="sensorSelect">
                <option>Solar_hr</option>
                <option>RH</option>
                <option>WSpeed</option>
                <option>BP</option>
                <option>Rain_hr</option>
            </select>
        </div>
        <div class="form-group">
            <label for="lowerThreshold">Lower Threshold</label>
            <input type="number" class="form-control" id="lowerThreshold" placeholder="Enter lower threshold">
        </div>
        <div class="form-group">
            <label for="higherThreshold">Higher Threshold</label>
            <input type="number" class="form-control" id="higherThreshold" placeholder="Enter higher threshold">
        </div>
        <div class="form-group">
            <label for="timeDelay">Time Delay</label>
            <input type="number" class="form-control" id="timeDelay" placeholder="Enter time delay">
        </div>
        <button class="btn btn-primary" id="submitButton">Submit</button>
    </div>
</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
    </div>
    <div class="mt-3">
        <p id="loaderText">Loading...</p>
        <div class="progress">
            <div class="progress-bar bg-success" role="progressbar" id="progressBar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>
</div>

<!-- Modal for selecting tables -->
<div class="modal fade" id="tablesModal" tabindex="-1" role="dialog" aria-labelledby="tablesModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tablesModalLabel">Select Tables</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body modal-body-scrollable">
                <div id="tablesSection"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" data-dismiss="modal">Save Selection</button>
            </div>
        </div>
    </div>
</div>

<!-- Results Modal -->
<div class="modal fade" id="resultsModal" tabindex="-1" role="dialog" aria-labelledby="resultsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="resultsModalLabel">Sensor Status</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <h5>Settings</h5>
                <p id="settingsDisplay"></p>
                <h5>Selected Topics and Sensor Status</h5>
                <div class="table-responsive">
                    <table class="table modal-table">
                        <thead>
                            <tr>
                                <th>Topic</th>
                                <th>Solar_hr</th>
                                <th>RH</th>
                                <th>WSpeed</th>
                                <th>BP</th>
                                <th>Rain_hr</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmButton">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function() {
        const groupsEndpoint = '{{ api_base_url }}/groups_with_topics';
        const tablesEndpoint = '{{ api_base_url }}/get_all_tables';
        const combinedDataEndpoint = '{{ api_base_url }}/combined_data/';
        const saveThresholdEndpoint = '/save_threshold';
        const settingsFileEndpoint = '/path/to/threshold_settings.json'; // Adjust path to your JSON settings file endpoint

        $('#individualButton').on('click', function() {
            $('#step1').addClass('hidden');
            $('#step2').removeClass('hidden');
            $('#individualConfig').removeClass('hidden');
            $('#groupConfig').addClass('hidden');
            fetch(tablesEndpoint)
                .then(response => response.json())
                .then(data => {
                    createTablesSection(data.tables);
                })
                .catch(error => console.error('Error fetching table data:', error));
        });

        $('#groupButton').on('click', function() {
            $('#step1').addClass('hidden');
            $('#step2').removeClass('hidden');
            $('#groupConfig').removeClass('hidden');
            $('#individualConfig').addClass('hidden');
            fetch(groupsEndpoint)
                .then(response => response.json())
                .then(data => {
                    createAccordion(data);
                })
                .catch(error => console.error('Error fetching group data:', error));
        });

        $('#switchToIndividual').on('click', function() {
            $('#groupConfig').addClass('hidden');
            $('#individualConfig').removeClass('hidden');
            fetch(tablesEndpoint)
                .then(response => response.json())
                .then(data => {
                    createTablesSection(data.tables);
                })
                .catch(error => console.error('Error fetching table data:', error));
        });

        $('#switchToGroup').on('click', function() {
            $('#individualConfig').addClass('hidden');
            $('#groupConfig').removeClass('hidden');
            fetch(groupsEndpoint)
                .then(response => response.json())
                .then(data => {
                    createAccordion(data);
                })
                .catch(error => console.error('Error fetching group data:', error));
        });

        function createAccordion(data) {
            const accordion = $('#accordion');
            accordion.empty();
            Object.keys(data).forEach((group, index) => {
                const groupId = `group${index}`;
                const groupItem = `
                    <div class="card">
                        <div class="card-header" id="heading${groupId}">
                            <h2 class="mb-0">
                                <button class="btn btn-link btn-block text-left accordion-button" type="button" data-toggle="collapse" data-target="#collapse${groupId}" aria-expanded="true" aria-controls="collapse${groupId}">
                                    <input type="checkbox" class="group-checkbox mr-2" data-group="${group}">${group}
                                </button>
                            </h2>
                        </div>
                        <div id="collapse${groupId}" class="collapse" aria-labelledby="heading${groupId}" data-parent="#accordion">
                            <div class="card-body">
                                ${data[group].map(topic => `
                                    <div class="form-check">
                                        <input class="form-check-input topic-checkbox" type="checkbox" data-group="${group}" data-topic="${topic}">
                                        <label class="form-check-label">
                                            ${topic}
                                        </label>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                accordion.append(groupItem);
            });

            // Handle group checkbox click
            $('.group-checkbox').on('click', function() {
                const group = $(this).data('group');
                const isChecked = $(this).is(':checked');
                $(`.topic-checkbox[data-group="${group}"]`).prop('checked', isChecked);
            });

            // Handle topic checkbox click
            $('.topic-checkbox').on('click', function() {
                const group = $(this).data('group');
                const allChecked = $(`.topic-checkbox[data-group="${group}"]`).length === $(`.topic-checkbox[data-group="${group}"]:checked`).length;
                $(`.group-checkbox[data-group="${group}"]`).prop('checked', allChecked);
            });
        }

        function createTablesSection(tables) {
            const tablesSection = $('#tablesSection');
            tablesSection.empty();
            tables.forEach((table, index) => {
                const tableItem = `
                    <div class="station-item" title="${table}">
                        <input class="form-check-input table-checkbox" type="checkbox" data-table="${table}">
                        <label class="form-check-label">
                            ${table}
                        </label>
                    </div>
                `;
                tablesSection.append(tableItem);
            });
        }

        $('#submitButton').on('click', async function() {
            await handleSubmission($('#groupConfig').is(':visible'));
        });

        async function handleSubmission(isGroupBased) {
            const selectedTopics = [];
            if (isGroupBased) {
                $('.topic-checkbox:checked').each(function() {
                    selectedTopics.push($(this).data('topic'));
                });
            } else {
                $('.table-checkbox:checked').each(function() {
                    selectedTopics.push($(this).data('table'));
                });
            }

            const selectedSensor = $('#sensorSelect').val();
            const lowerThreshold = $('#lowerThreshold').val();
            const higherThreshold = $('#higherThreshold').val();
            const timeDelay = $('#timeDelay').val();

            const submissionData = {
                station: selectedTopics.join(', '),
                sensorSettings: selectedSensor,
                lowThreshold: lowerThreshold,
                highThreshold: higherThreshold,
                timeDelay: timeDelay
            };

            console.log('Submission Data:', submissionData);

            // Fetch existing settings
            const existingSettings = await fetch(settingsFileEndpoint)
                .then(response => response.json())
                .catch(error => {
                    console.error('Error fetching existing settings:', error);
                    return {};
                });

            // Check if any station already exists
            const existingStations = selectedTopics.filter(station => existingSettings.hasOwnProperty(station));
            if (existingStations.length > 0) {
                if (!confirm('One or more stations already exist. Do you want to overwrite the existing settings?')) {
                    return;
                }
            }

            // Display the settings in the modal
            const settingsDisplay = `
                <strong>Selected Sensor:</strong> ${selectedSensor}<br>
                <strong>Lower Threshold:</strong> ${lowerThreshold}<br>
                <strong>Higher Threshold:</strong> ${higherThreshold}<br>
                <strong>Time Delay:</strong> ${timeDelay}
            `;
            $('#settingsDisplay').html(settingsDisplay);

            // Show loader
            $('#loader').addClass('show');

            const modalTableBody = $('#modalTableBody');
            modalTableBody.empty();

            let loadedCount = 0;
            const totalTopics = selectedTopics.length;

            const fetchTopicData = topic => {
                return fetch(`${combinedDataEndpoint}${topic}`)
                    .then(response => response.json())
                    .catch(error => {
                        console.error('Error fetching topic data:', error);
                        return null;
                    });
            };

            const updateProgress = () => {
                loadedCount++;
                const progress = (loadedCount / totalTopics) * 100;
                $('#progressBar').css('width', `${progress}%`);
                $('#loaderText').text(`Loading ${loadedCount} of ${totalTopics} topics (${Math.round(progress)}%)`);
            };

            const topicDataPromises = selectedTopics.map(topic => {
                return fetchTopicData(topic).then(data => {
                    updateProgress();
                    return { topic, data };
                });
            });

            const topicsData = await Promise.all(topicDataPromises);

            topicsData.forEach(({ topic, data }) => {
                if (data && data.data) {
                    const relationalData = data.data.relational_data;
                    const timescaleData = data.data.timescale_data;

                    const sensors = {
                        Solar_hr: 'offline',
                        RH: 'offline',
                        WSpeed: 'offline',
                        BP: 'offline',
                        Rain_hr: 'offline'
                    };

                    timescaleData.forEach(sensorData => {
                        const sensorName = sensorData[2];
                        const sensorValue = sensorData[4];
                        if (sensorName in sensors) {
                            sensors[sensorName] = sensorValue !== null ? 'online' : 'offline';
                        }
                    });

                    const row = `
                        <tr>
                            <td>${relationalData.name}</td>
                            <td class="${sensors.Solar_hr === 'offline' ? 'offline' : 'online'}">${sensors.Solar_hr}</td>
                            <td class="${sensors.RH === 'offline' ? 'offline' : 'online'}">${sensors.RH}</td>
                            <td class="${sensors.WSpeed === 'offline' ? 'offline' : 'online'}">${sensors.WSpeed}</td>
                            <td class="${sensors.BP === 'offline' ? 'offline' : 'online'}">${sensors.BP}</td>
                            <td class="${sensors.Rain_hr === 'offline' ? 'offline' : 'online'}">${sensors.Rain_hr}</td>
                        </tr>
                    `;
                    modalTableBody.append(row);
                } else {
                    const row = `
                        <tr>
                            <td>${topic}</td>
                            <td class="offline">offline</td>
                            <td class="offline">offline</td>
                            <td class="offline">offline</td>
                            <td class="offline">offline</td>
                            <td class="offline">offline</td>
                        </tr>
                    `;
                    modalTableBody.append(row);
                }
            });

            // Hide loader and show modal
            $('#loader').removeClass('show');
            $('#resultsModal').modal('show');
        }

        $('#confirmButton').on('click', async function() {
            const selectedTopics = [];
            $('.topic-checkbox:checked').each(function() {
                selectedTopics.push($(this).data('topic'));
            });
            $('.table-checkbox:checked').each(function() {
                selectedTopics.push($(this).data('table'));
            });

            const selectedSensor = $('#sensorSelect').val();
            const lowerThreshold = $('#lowerThreshold').val();
            const higherThreshold = $('#higherThreshold').val();
            const timeDelay = $('#timeDelay').val();

            const submissionData = {
                station: selectedTopics.join(', '),
                sensorSettings: selectedSensor,
                lowThreshold: lowerThreshold,
                highThreshold: higherThreshold,
                timeDelay: timeDelay
            };

            try {
                const response = await fetch(saveThresholdEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(submissionData)
                });

                const result = await response.json();
                console.log('Response from server:', result);

                if (response.ok) {
                    $('#resultsModal').modal('hide');
                    alert('Threshold settings saved successfully!');
                } else {
                    console.error('Error:', result.message);
                    alert('Error saving threshold settings.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving threshold settings.');
            }
        });
    });
</script>
</body>
</html>
