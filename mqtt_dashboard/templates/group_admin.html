<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="title" content="MQTT Dashboard">
    <meta name="description" content=" Track your  data from Campbell Scientific devices">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<style>
    tbody>tr:hover {
        background-color: grey;
    }

    .selected {
        background-color: black;
    }
</style>

<body class="bg-light overflow-hidden">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script type="text/javascript" src="{{url_for('static',filename='index.js')}}"></script>
    <div class="vh-100 d-flex flex-column">
        <nav class="site-header sticky-top py-1 bg-white">

            <div style="display: flex; align-items:center;"
                class="container d-flex flex-column flex-md-row justify-content-between">
                <img style="max-width: 20%" class="img-fluid py-2 d-none d-md-inline-block"
                    src="{{url_for('static',filename='ZMD logo.jpg')}}" alt="">
                <a class="py-2 d-none d-md-inline-block" href="/dashboard_admin">
                    Dashboard Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/broker_admin">
                    Broker Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/group_admin">
                    Group Admin
                </a>
                <a class="py-2 d-none d-md-inline-block" href="/">
                    Exit
                </a>
            </div>
        </nav>

        <div style="display: flex" class="bg-light flex-grow-1 overflow-auto vw-100">
            <div style="border-radius: 10px; text-align: center;" class="bg-dark w-25 m-1 text-white">
                <h1 style="text-align: center;">
                    Groups
                </h1>
                <div style="height: 40%;" class="overflow-auto mt-2 ml-2 mr-2">
                    <table style="width:100%; text-align: center;" id="group-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                </div>
                <button class="btn btn-primary w-75" id="removeGroupBtn" disabled>Remove Group</button>
                <div class="mt-5">
                    <div style="margin-left: auto;margin-right: auto;" class="form-group w-75">
                        <input type="text" class="form-control" id="groupInput" placeholder="Enter Group Name">
                    </div>
                    <button class="btn btn-primary w-50" id="addGroupBtn">Add New Group</button>
                    <div style="color: red;text-align: center;" class="w-100" id="alertDiv">
                    </div>
                </div>
            </div>
            <div style="border-radius: 10px;text-align: center;width:37.5%;" class="bg-dark m-1 text-white">
                <h1 style="text-align: center;">
                    Added Tables
                </h1>
                <div style="height: 80%;" class="overflow-auto mt-2 ml-2 mr-2">
                    <table style="width:100%; text-align: center;" id="added-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Topic</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                </div>
                <button class="btn btn-primary w-50" id="removeTableBtn">Remove Table</button>
            </div>
            <div style="border-radius: 10px;text-align: center; width:37.5%;" class="bg-dark m-1 text-white">
                <h1 style="text-align: center;">
                    Unadded Tables
                </h1>
                <div style="height: 80%;" class="overflow-auto mt-2 ml-2 mr-2">
                    <table style="width:100%; text-align: center;" id="unadded-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Topic</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                </div>
                <button class="btn btn-primary w-50" id="addTableBtn">Add Table</button>
            </div>

        </div>
</body>
<script>
    var groups = [];
    var selectedUnaddedID = -1;
    var selectedAddedID = -1;
    var selectedGroupID = 0;
    {%for group in groups %}
    groups.push({ id: {{ group["id"]}}, name: "{{group["group"]}}"});
    {% endfor %}

    $("#removeGroupBtn").prop('disabled', true);
    $("#addTableBtn").prop('disabled', true);
    $("#removeTableBtn").prop('disabled', true);


    function setSelectedGroup(groupID, group) {
        selectedGroupID = groupID
    }

    function clickTableRowsGroup() {
        $(this).addClass('selected').siblings().removeClass('selected');
        var value = $(this).find('td:first').html();
        selectedGroupID = parseInt(value);
        clearTableRowsAdded();
        fillAddedTable();
        $("#removeGroupBtn").prop('disabled', false);
    }

    function addTableRowGroup(groupID, groupName) {
        $("#group-table").append("<tr><td>" + groupID.toString() + "</td><td>" + groupName + "</td></tr>");
    }

    function clearTableRowsGroup() {
        $("#group-table > tbody").empty();

    }

    function clearTableRowsAdded() {
        $("#added-table > tbody").empty();
    }
    function clearTableRowsUnadded() {
        $("#unadded-table > tbody").empty();
    }

    function clickTableRowsUnadded() {
        $(this).addClass('selected').siblings().removeClass('selected');
        var value = $(this).find('td:first').html();
        selectedUnaddedID = parseInt(value);
        $("#addTableBtn").prop("disabled",false);
    }

    function clickTableRowsAdded() {
        $(this).addClass('selected').siblings().removeClass('selected');
        var value = $(this).find('td:first').html();
        selectedAddedID = parseInt(value);
        $("#removeTableBtn").prop('disabled', false);
    }

    $(document).on('click', '#removeTableBtn', function () {

        if (selectedAddedID == -1) return;

        var params = JSON.stringify({ "tableID": selectedAddedID });

        fetch("/remove_table_from_group", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                clearTableRowsAdded();
                clearTableRowsUnadded();
                fillAddedTable();
                fillUnaddedTable();
            })

    });

    $(document).on('click', '#addTableBtn', function () {
        if(selectedUnaddedID==0 || selectedGroupID==0) return;
        var params = JSON.stringify({ "tableID": selectedUnaddedID, "groupID": selectedGroupID });

        fetch("/add_table_to_group", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                clearTableRowsAdded();
                clearTableRowsUnadded();
                fillAddedTable();
                fillUnaddedTable();
            })

    });

    $(document).on('click', '#addGroupBtn', function () {
        var params = JSON.stringify({ "name":$("#groupInput").val()});

        fetch("/create_group", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                clearTableRowsGroup();
                fillGroupTable();
            })

    });

    $(document).on('click', '#removeGroupBtn', function () {
        var params = JSON.stringify({ "groupID":selectedGroupID});

        fetch("/delete_group", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                clearTableRowsGroup();
                fillGroupTable();
                clearTableRowsUnadded();
                fillUnaddedTable();
                clearTableRowsAdded();
            })

    });

    function fillUnaddedTable() {
        selectedUnaddedID = -1;
        fetch("/unadded", {
            method: 'post',
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                json["unadded"].forEach(function (unadded) {

                    $("#unadded-table").append("<tr><td>" + unadded.id + "</td><td>" + unadded.topic + "</td></tr>")
                });
                $("#unadded-table>tbody>tr").click(clickTableRowsUnadded);
                $("#addTableBtn").prop("disabled",true);
            });
    }

    fillUnaddedTable();

    function fillAddedTable() {
        selectedAddedID = -1;
        if (selectedGroupID == 0) {
            return
        }
        var params = JSON.stringify({ "searchval": selectedGroupID });
        fetch("/added", {
            method: 'post',
            body: params,
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                json["added"].forEach(function (added) {

                    $("#added-table").append("<tr><td>" + added.id + "</td><td>" + added.topic + "</td></tr>")
                });
                $("#added-table>tbody>tr").click(clickTableRowsAdded);
                $("#removeTableBtn").prop("disabled",true);
            });
    }

    groups.forEach(function (group) {
        addTableRowGroup(group.id, group.name);
    });

    function fillGroupTable()
    {
        console.log("Fill group table called")
        selectedGroupID=0;
        fetch("/groups", {
            method: 'post',
            mode: 'cors',
            headers: new Headers({
                'Content-Type': 'application/json'
            })
        })
            .then(response => response.json())
            .then(function (json) {
                json["groups"].forEach(function (group) {

                    addTableRowGroup(group.id,group.name)
                });
                $("#group-table>tbody>tr").click(clickTableRowsGroup);
                $("#removeGroupBtn").prop("disabled",true);
            });
    }

    $("#group-table>tbody>tr").click(clickTableRowsGroup);
</script>

</html>
