<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="application/json; charset=UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Helvetica', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .logo {
            width: 200px;
        }

        .sidebar {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
           
            border-right: 1px solid #ccc;
        }

        .form-check {
            margin-bottom: 10px;
        }

        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #ccc;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-9">
                <div id="map"></div>
            </div>
            <div class="col-md-3">
                <div class="sidebar">
                    <img src="../static/logo.png" class="logo" alt="Logo Description"><hr>
                    {% if user_name %}
                    <p>You are logged in as, {{ user_name }}!</p>
                    {% else %}
                    <p>Please log in to view this content.</p>
                    {% endif %}<hr>
                    <form action="{{ url_for('auth.logout') }}" method="get">
                        <button type="submit" class="btn btn-danger">Logout</button>
                    </form><hr>
                    <h4>Clients</h4><hr>
                    <div id="userList" style="height: 100vh; overflow-y: auto;"></div>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <script>
        let markers = {};

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 10)];
            }
            return color;
        }

        async function fetchData() {
            try {
                const response = await fetch('/admin_user_data');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        

        async function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                center: {
                    lat: 0,
                    lng: 0
                },
                zoom: 2
            });

            const jsonData = await fetchData();

            for (const key in jsonData.data) {
                const userColor = getRandomColor();

                jsonData.data[key].forEach(item => {
                    const marker = new google.maps.Marker({
                        position: {
                            lat: item.longitude, // Use longitude as latitude
                            lng: item.latitude // Use latitude as longitude
                        },
                        map: map,
                        title: item.name,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            fillColor: userColor,
                            fillOpacity: 1,
                            scale: 8,
                            strokeColor: 'white',
                            strokeWeight: 1
                        },
                    });

                    if (!markers[key]) {
                        markers[key] = [];
                    }

                    markers[key].push(marker);

                    marker.addListener('click', function () {
                        const link = `{{ api_base_url }}/topic/${item.topic_id}`;
                        window.open(link, '_blank');
                    });
                });

                const userList = document.getElementById('userList');
                const checkbox = document.createElement('div');
                checkbox.classList.add('form-check');

                const input = document.createElement('input');
                input.type = 'checkbox';
                input.classList.add('form-check-input');
                input.name = key;
                input.value = key;
                input.id = key;
                input.checked = true;

                const label = document.createElement('label');
                label.classList.add('form-check-label');
                label.htmlFor = key;
                label.appendChild(document.createTextNode(key));

                const colorBox = document.createElement('div');
                colorBox.classList.add('color-box');
                colorBox.style.backgroundColor = userColor;

                checkbox.appendChild(input);
                checkbox.appendChild(colorBox);
                checkbox.appendChild(label);

                userList.appendChild(checkbox);

                input.addEventListener('change', function () {
                    togglePoints(key);
                });
            }
        }

        function togglePoints(key) {
            markers[key].forEach(marker => {
                marker.setVisible(!marker.getVisible());
            });
        }
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRTWImA1TaxPRR6HVRjF1PCcKl3vG2Imo&callback=initMap" async defer></script>
    <!-- Replace YOUR_API_KEY with your actual Google Maps API key -->
</body>

</html>
