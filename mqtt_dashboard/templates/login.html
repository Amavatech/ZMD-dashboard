{% extends "base.html" %}

{% block head%}
<title>
    Login
</title>
{% endblock %}

{% block content %}
<div class="mx-auto w-75">
    <div class=" col-md-5 p-lg-5 mx-auto my-5 rounded bg-dark text-light">
        <img class="mb-4 w-50" src="{{url_for('static',filename='ZMD logo.jpg')}}" alt="">

        <form method="POST" action="/login" class="form-signin">
            <h1 class="h3 mb-3 font-weight-normal">Please sign in</h1>
            <label for="inputEmail" class="sr-only">Email address</label>
            <input type="email" id="inputEmail" name="email" class="form-control mb-3" placeholder="Email address" required autofocus>
            <label for="inputPassword" class="sr-only">Password</label>
            <input type="password" id="inputPassword" name="password" class="form-control  mb-3" placeholder="Password" required>
            <div class="checkbox mb-3">
                <label>
                    <input type="checkbox" value="remember-me" name="remember">
                    Remember me
                </label>
            </div>
            <button class="btn btn-lg btn-primary btn-block" type="submit">Sign in</button>
        </form>
    </div>
</div>
{% endblock %}
